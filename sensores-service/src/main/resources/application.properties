spring.application.name=sensores-service
server.port=${PORT:8083}

server.servlet.encoding.charset=UTF-8
server.servlet.encoding.force=true

SPRING_DATASOURCE_URL=jdbc:mysql://${{MySQL.MYSQLHOST}}:${{MySQL.MYSQLPORT}}/${{MySQL.MYSQLDATABASE}}
SPRING_DATASOURCE_USERNAME=${{MySQL.MYSQLUSER}}
SPRING_DATASOURCE_PASSWORD=${{MySQL.MYSQLPASSWORD}}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.hibernate.ddl-auto=none
spring.jpa.open-in-view=false

mqtt.broker=${MQTT_BROKER:ssl://d293d13a6a7c49bbbc434365cac41121.s1.eu.hivemq.cloud:8883}
mqtt.client-id=${MQTT_CLIENT_ID:SriSensoresService}
