spring.application.name=sensores-service
server.port=${PORT:8083}

server.servlet.encoding.charset=UTF-8
server.servlet.encoding.force=true

spring.datasource.url=${SPRING_DATASOURCE_URL}
spring.datasource.username=${SPRING_DATASOURCE_USER}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.hibernate.ddl-auto=none
spring.jpa.open-in-view=false

mqtt.broker=${MQTT_BROKER:ssl://d293d13a6a7c49bbbc434365cac41121.s1.eu.hivemq.cloud:8883}
mqtt.client-id=${MQTT_CLIENT_ID:SriSensoresService}
riego.mqtt.payload-on=${RIEGO_MQTT_PAYLOAD_ON:1}
riego.mqtt.payload-off=${RIEGO_MQTT_PAYLOAD_OFF:0}
